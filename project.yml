name: MGLinker
options:
  bundleIdPrefix: com.mglinker
  deploymentTarget:
    iOS: 16.0

settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SWIFT_VERSION: "5.0"

targets:
  MGLinker:
    type: application
    platform: iOS
    sources:
      - path: MGLinker/App
    settings:
      INFOPLIST_FILE: MGLinker/App/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.mglinker.app
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
    info:
      path: MGLinker/App/Info.plist