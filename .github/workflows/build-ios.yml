name: Build MG Linker iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
        xcodebuild -version
        
    - name: Generate Xcode project
      run: xcodegen generate
      
    - name: Build iOS app
      run: |
        xcodebuild clean build \
          -project MGLinker.xcodeproj \
          -scheme MGLinker \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Create IPA
      run: |
        mkdir -p build/Payload
        cp -r build/Build/Products/Release-iphoneos/MGLinker.app build/Payload/
        cd build
        zip -r MGLinker.ipa Payload
        cp MGLinker.ipa MGLinker.tipa
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MG-Linker-iOS
        path: |
          build/MGLinker.ipa
          build/MGLinker.tipa
        retention-days: 90