name: Build MG Linker iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
        xcodebuild -version
        swift --version
        
    - name: Build with Swift
      run: |
        swift build -c release --sdk iphoneos
        
    - name: Create IPA structure
      run: |
        mkdir -p Payload/MGLinker.app
        cp -r .build/release/MGLinker Payload/MGLinker.app/
        
        # Create minimal Info.plist
        cat > Payload/MGLinker.app/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>MGLinker</string>
            <key>CFBundleIdentifier</key>
            <string>com.mglinker.app</string>
            <key>CFBundleName</key>
            <string>MG Linker</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
            </array>
        </dict>
        </plist>
        EOF
        
        # Create PkgInfo
        echo -n "APPL????" > Payload/MGLinker.app/PkgInfo
        
        # Create IPA
        zip -r MGLinker.ipa Payload
        cp MGLinker.ipa MGLinker.tipa
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MG-Linker-iOS
        path: |
          MGLinker.ipa
          MGLinker.tipa
        retention-days: 90