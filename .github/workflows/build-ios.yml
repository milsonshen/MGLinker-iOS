name: Build MG Linker iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
        xcodebuild -version
        
    - name: Create Xcode project
      run: |
        # 删除旧文件
        rm -rf build Sources Package.swift
        
        # 创建项目结构
        mkdir -p MGLinker
        
        # 创建 Swift 文件
        cat > MGLinker/App.swift << 'EOF'
        import SwiftUI
        
        @main
        struct MGLinkerApp: App {
            @StateObject private var vehicleManager = VehicleManager.shared
            
            var body: some Scene {
                WindowGroup {
                    if vehicleManager.isConfigured {
                        MainTabView()
                            .environmentObject(vehicleManager)
                    } else {
                        ConfigurationView()
                            .environmentObject(vehicleManager)
                    }
                }
            }
        }
        EOF
        
        cat > MGLinker/Models.swift << 'EOF'
        import Foundation
        
        struct VehicleStatusResponse: Codable {
            let req_id: String?
            let data: VehicleData?
        }
        
        struct VehicleData: Codable {
            let vehicle_position: VehiclePosition?
            let vehicle_value: VehicleValue?
            let vehicle_state: VehicleState?
            let update_time: Int64?
        }
        
        struct VehiclePosition: Codable {
            let latitude: String?
            let longitude: String?
        }
        
        struct VehicleValue: Codable {
            let fuel_level_prc: Int?
            let fuel_range: Int?
            let odometer: Int?
            let battery_pack_prc: Int?
            let battery_pack_range: Int?
            let interior_temperature: Double?
            let front_left_tyre_pressure: Int?
            let front_right_tyre_pressure: Int?
            let rear_left_tyre_pressure: Int?
            let rear_right_tyre_pressure: Int?
        }
        
        struct VehicleState: Codable {
            let door: Bool
            let driver_door: Bool
            let passenger_door: Bool
            let rear_left_door: Bool
            let rear_right_door: Bool
            let boot: Bool
            let lock: Bool
            let window: Bool
            let driver_window: Bool
            let passenger_window: Bool
            let rear_left_window: Bool
            let rear_right_window: Bool
            let sunroof: Bool
            let engine: Bool
            let climate: Bool
            let update_time: Int64
        }
        
        struct CarConfig: Codable {
            let brand: String
            let model: String
            let colors: [CarColor]
            let fuel: Double?
            let battery: Double?
        }
        
        struct CarColor: Codable {
            let name: String
            let imageUrl: String
        }
        
        struct RemoteConfig: Codable {
            let saic: [CarConfig]
        }
        EOF
        
        cat > MGLinker/ViewModels.swift << 'EOF'
        import Foundation
        import SwiftUI
        
        @MainActor
        class VehicleManager: ObservableObject {
            static let shared = VehicleManager()
            
            @Published var vehicleData: VehicleStatusResponse?
            @Published var carConfigList: [CarConfig] = []
            @Published var isLoading = false
            @Published var errorMessage: String?
            @Published var lastUpdateTime: Date?
            
            @AppStorage("carBrand") var carBrand: String = "名爵"
            @AppStorage("carModel") var carModel: String = ""
            @AppStorage("carName") var carName: String = ""
            @AppStorage("vin") var vin: String = ""
            @AppStorage("color") var color: String = ""
            @AppStorage("plateNumber") var plateNumber: String = ""
            @AppStorage("accessToken") var accessToken: String = ""
            @AppStorage("isConfigured") var isConfigured: Bool = false
            
            private var refreshTimer: Timer?
            
            private init() {
                loadCarConfig()
                startAutoRefresh()
            }
            
            func loadCarConfig() {
                Task {
                    guard let url = URL(string: "https://gitee.com/yangyachao-X/mg-linker/raw/master/other/config.json") else { return }
                    do {
                        let (data, _) = try await URLSession.shared.data(from: url)
                        let config = try JSONDecoder().decode(RemoteConfig.self, from: data)
                        carConfigList = config.saic
                    } catch {
                        print("Load config error: \(error)")
                    }
                }
            }
            
            func fetchVehicleData() async {
                guard !vin.isEmpty, !accessToken.isEmpty else {
                    errorMessage = "请先配置车辆信息"
                    return
                }
                
                isLoading = true
                errorMessage = nil
                
                let timestamp = Int(Date().timeIntervalSince1970)
                let urlString = "https://mp.ebanma.com/app-mp/vp/1.1/getVehicleStatus?timestamp=\(timestamp)&token=\(accessToken)&vin=\(vin)"
                
                guard let url = URL(string: urlString) else {
                    errorMessage = "无效的URL"
                    isLoading = false
                    return
                }
                
                do {
                    let (data, _) = try await URLSession.shared.data(from: url)
                    vehicleData = try JSONDecoder().decode(VehicleStatusResponse.self, from: data)
                    lastUpdateTime = Date()
                } catch {
                    errorMessage = "获取数据失败: \(error.localizedDescription)"
                }
                
                isLoading = false
            }
            
            func saveConfig(brand: String, model: String, vin: String, plate: String, token: String) -> Bool {
                guard vin.count == 17 else {
                    errorMessage = "请输入17位车架号"
                    return false
                }
                
                guard token.hasSuffix("-prod_SAIC") else {
                    errorMessage = "Token格式不正确"
                    return false
                }
                
                carBrand = brand
                carModel = model
                self.vin = vin
                plateNumber = plate
                accessToken = token
                isConfigured = true
                
                Task { await fetchVehicleData() }
                return true
            }
            
            func refreshData() async {
                await fetchVehicleData()
            }
            
            private func startAutoRefresh() {
                refreshTimer?.invalidate()
                refreshTimer = Timer.scheduledTimer(withTimeInterval: 1800, repeats: true) { [weak self] _ in
                    Task { @MainActor in await self?.fetchVehicleData() }
                }
            }
        }
        EOF
        
        cat > MGLinker/Views.swift << 'EOF'
        import SwiftUI
        
        struct MainTabView: View {
            var body: some View {
                TabView {
                    VehicleStatusView()
                        .tabItem { Label("车辆", systemImage: "car.fill") }
                    RemoteControlView()
                        .tabItem { Label("控制", systemImage: "gear") }
                    SettingsView()
                        .tabItem { Label("设置", systemImage: "gearshape.fill") }
                }
            }
        }
        
        struct VehicleStatusView: View {
            @EnvironmentObject var vm: VehicleManager
            
            var body: some View {
                NavigationView {
                    ScrollView {
                        VStack(spacing: 16) {
                            // 车辆信息
                            HStack {
                                Image(systemName: "car.fill")
                                    .font(.largeTitle)
                                    .foregroundColor(.blue)
                                VStack(alignment: .leading) {
                                    Text(vm.carName.isEmpty ? vm.carModel : vm.carName)
                                        .font(.headline)
                                    Text(vm.plateNumber)
                                        .foregroundColor(.gray)
                                }
                                Spacer()
                            }
                            .padding()
                            .background(Color(.systemBackground))
                            .cornerRadius(12)
                            
                            // 续航信息
                            if let data = vm.vehicleData?.data {
                                LazyVGrid(columns: [GridItem(.flexible()), GridItem(.flexible())], spacing: 12) {
                                    StatusCard(title: "燃油续航", value: "\(data.vehicle_value?.fuel_range ?? 0) km", icon: "fuelpump.fill", color: .orange)
                                    StatusCard(title: "电池续航", value: "\(data.vehicle_value?.battery_pack_range ?? 0) km", icon: "battery.100.bolt", color: .green)
                                    StatusCard(title: "总里程", value: "\(data.vehicle_value?.odometer ?? 0) km", icon: "road.lanes", color: .blue)
                                    StatusCard(title: "车内温度", value: String(format: "%.1f°C", data.vehicle_value?.interior_temperature ?? 0), icon: "thermometer", color: .red)
                                }
                                
                                // 车门状态
                                HStack(spacing: 20) {
                                    StatusIcon(name: "车门", isOpen: data.vehicle_state.door, openIcon: "door.left.hand.open", closedIcon: "door.left.hand.closed")
                                    StatusIcon(name: "车窗", isOpen: data.vehicle_state.window, openIcon: "window.vertical.open", closedIcon: "window.vertical.closed")
                                    StatusIcon(name: "后备箱", isOpen: data.vehicle_state.boot, openIcon: "car.side.rear.open", closedIcon: "car.side.rear.closed")
                                    StatusIcon(name: "门锁", isOpen: !data.vehicle_state.lock, openIcon: "lock.open.fill", closedIcon: "lock.fill")
                                }
                                .padding()
                                .background(Color(.systemBackground))
                                .cornerRadius(12)
                                
                                // 胎压
                                VStack(alignment: .leading) {
                                    Text("轮胎压力").font(.headline)
                                    LazyVGrid(columns: [GridItem(.flexible()), GridItem(.flexible())], spacing: 8) {
                                        TireView(position: "左前", pressure: data.vehicle_value?.front_left_tyre_pressure)
                                        TireView(position: "右前", pressure: data.vehicle_value?.front_right_tyre_pressure)
                                        TireView(position: "左后", pressure: data.vehicle_value?.rear_left_tyre_pressure)
                                        TireView(position: "右后", pressure: data.vehicle_value?.rear_right_tyre_pressure)
                                    }
                                }
                                .padding()
                                .background(Color(.systemBackground))
                                .cornerRadius(12)
                            }
                            
                            if let time = vm.lastUpdateTime {
                                Text("更新: \(time.formatted(date: .omitted, time: .shortened))")
                                    .font(.caption)
                                    .foregroundColor(.gray)
                            }
                        }
                        .padding()
                    }
                    .navigationTitle("MG Linker")
                    .refreshable { await vm.refreshData() }
                    .overlay {
                        if vm.isLoading { ProgressView("加载中...").padding().background(.ultraThinMaterial).cornerRadius(10) }
                    }
                }
            }
        }
        
        struct StatusCard: View {
            let title: String, value: String, icon: String, color: Color
            var body: some View {
                VStack {
                    Image(systemName: icon).font(.title2).foregroundColor(color)
                    Text(title).font(.caption).foregroundColor(.gray)
                    Text(value).font(.headline)
                }
                .frame(maxWidth: .infinity)
                .padding()
                .background(Color(.systemBackground))
                .cornerRadius(10)
            }
        }
        
        struct StatusIcon: View {
            let name: String, isOpen: Bool, openIcon: String, closedIcon: String
            var body: some View {
                VStack {
                    Image(systemName: isOpen ? openIcon : closedIcon)
                        .font(.title2)
                        .foregroundColor(isOpen ? .red : .green)
                    Text(name).font(.caption)
                    Text(isOpen ? "未关" : "已关").font(.caption2).foregroundColor(isOpen ? .red : .green)
                }
            }
        }
        
        struct TireView: View {
            let position: String, pressure: Int?
            var body: some View {
                VStack {
                    Text(position).font(.caption)
                    if let p = pressure {
                        let bar = Double(p) / 100.0
                        Text(String(format: "%.1f Bar", bar))
                            .foregroundColor(bar >= 2.0 && bar <= 3.8 ? .green : .red)
                    } else {
                        Text("- Bar").foregroundColor(.gray)
                    }
                }
                .frame(maxWidth: .infinity)
                .padding(8)
                .background(Color(.secondarySystemBackground))
                .cornerRadius(8)
            }
        }
        
        struct RemoteControlView: View {
            var body: some View {
                NavigationView {
                    List {
                        Section("车辆控制") {
                            ControlRow(title: "锁车", icon: "lock.fill")
                            ControlRow(title: "解锁", icon: "lock.open.fill")
                            ControlRow(title: "开启后备箱", icon: "car.side.rear.open")
                            ControlRow(title: "寻车", icon: "horn.fill")
                        }
                        Section("空调控制") {
                            ControlRow(title: "开启空调", icon: "snowflake")
                            ControlRow(title: "座椅加热", icon: "heater.fill")
                        }
                    }
                    .navigationTitle("远程控制")
                }
            }
        }
        
        struct ControlRow: View {
            let title: String, icon: String
            var body: some View {
                HStack {
                    Image(systemName: icon).foregroundColor(.blue)
                    Text(title)
                    Spacer()
                    Image(systemName: "chevron.right").foregroundColor(.gray)
                }
            }
        }
        
        struct SettingsView: View {
            @EnvironmentObject var vm: VehicleManager
            @State private var showConfig = false
            
            var body: some View {
                NavigationView {
                    List {
                        Section("车辆信息") {
                            HStack { Text("品牌"); Spacer(); Text(vm.carBrand).foregroundColor(.gray) }
                            HStack { Text("车型"); Spacer(); Text(vm.carModel).foregroundColor(.gray) }
                            HStack { Text("车架号"); Spacer(); Text(vm.vin).foregroundColor(.gray) }
                            Button("修改配置") { showConfig = true }
                        }
                        Section("关于") {
                            HStack { Text("版本"); Spacer(); Text("1.0").foregroundColor(.gray) }
                        }
                    }
                    .navigationTitle("设置")
                    .sheet(isPresented: $showConfig) { ConfigurationView() }
                }
            }
        }
        
        struct ConfigurationView: View {
            @EnvironmentObject var vm: VehicleManager
            @Environment(\.dismiss) var dismiss
            @State private brand = "名爵"
            @State private model = ""
            @State private vin = ""
            @State private plate = ""
            @State private token = ""
            
            var body: some View {
                NavigationView {
                    Form {
                        Picker("品牌", selection: $brand) {
                            Text("名爵").tag("名爵")
                            Text("荣威").tag("荣威")
                        }
                        .pickerStyle(.segmented)
                        
                        TextField("车型 (如 MG7)", text: $model)
                        TextField("17位车架号", text: $vin)
                        TextField("车牌号", text: $plate)
                        SecureField("ACCESS_TOKEN", text: $token)
                        
                        Section {
                            Text("Token格式: xxx-prod_SAIC")
                                .font(.caption)
                                .foregroundColor(.gray)
                        }
                        
                        Button("保存") {
                            if vm.saveConfig(brand: brand, model: model, vin: vin, plate: plate, token: token) {
                                dismiss()
                            }
                        }
                        .frame(maxWidth: .infinity)
                    }
                    .navigationTitle("配置")
                    .navigationBarItems(leading: Button("取消") { dismiss() })
                }
            }
        }
        EOF
        
    - name: Build with xcodebuild
      run: |
        # 创建临时项目文件
        cd MGLinker
        
        # 创建 Info.plist
        cat > Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key>
            <string>com.mglinker.app</string>
            <key>CFBundleName</key>
            <string>MG Linker</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
            </array>
            <key>NSAppTransportSecurity</key>
            <dict>
                <key>NSAllowsArbitraryLoads</key>
                <true/>
            </dict>
        </dict>
        </plist>
        EOF
        
        cd ..
        
        # 使用 swiftc 直接编译
        SDK_PATH=$(xcrun -sdk iphoneos --show-sdk-path)
        
        xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -sdk $SDK_PATH \
            -F $SDK_PATH/System/Library/Frameworks \
            -framework SwiftUI \
            -framework Foundation \
            -framework Combine \
            -o MGLinker \
            MGLinker/App.swift \
            MGLinker/Models.swift \
            MGLinker/ViewModels.swift \
            MGLinker/Views.swift
            
    - name: Create IPA
      run: |
        mkdir -p Payload/MGLinker.app
        mv MGLinker Payload/MGLinker.app/
        cp MGLinker/Info.plist Payload/MGLinker.app/
        echo -n "APPL????" > Payload/MGLinker.app/PkgInfo
        zip -r MGLinker.ipa Payload
        cp MGLinker.ipa MGLinker.tipa
        ls -la MGLinker.*
        du -h MGLinker.*
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MG-Linker-iOS
        path: |
          MGLinker.ipa
          MGLinker.tipa
        retention-days: 90