name: Build MG Linker iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
        xcodebuild -version
        xcodebuild -showsdks
        
    - name: List available schemes
      run: |
        xcodebuild -list -project MGLinker.xcodeproj
        
    - name: Build for iOS Device (No Signing)
      run: |
        set -o pipefail
        xcodebuild clean build \
          -project MGLinker.xcodeproj \
          -scheme "MGLinker" \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          CODE_SIGN_ENTITLEMENTS="" \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          2>&1 | xcpretty || true
          
    - name: Check build output
      run: |
        echo "=== Build Output ==="
        ls -la build/Build/Products/ || echo "No Products folder"
        ls -la build/Build/Products/Release-iphoneos/ || echo "No Release-iphoneos folder"
        
    - name: Create IPA
      if: success()
      run: |
        mkdir -p build/Payload
        if [ -d "build/Build/Products/Release-iphoneos/MGLinker.app" ]; then
          cp -r build/Build/Products/Release-iphoneos/MGLinker.app build/Payload/
          cd build
          zip -r MGLinker.ipa Payload
          cp MGLinker.ipa MGLinker.tipa
          echo "IPA created successfully"
        else
          echo "ERROR: MGLinker.app not found"
          exit 1
        fi
        
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MG-Linker-iOS
        path: |
          build/MGLinker.ipa
          build/MGLinker.tipa
        retention-days: 90